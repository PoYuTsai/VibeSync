name: vibesync
description: "VibeSync - AI 對話教練"
publish_to: 'none'

version: 1.0.1+334

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Unicode-safe text utilities (grapheme clusters for ZWJ-safe truncation in
  # PartnerSummaryBuilder). Already pulled transitively by Flutter SDK; we
  # depend on it explicitly so the lint is satisfied for non-widget code.
  characters: ^1.3.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local Storage (Hive CE - Dart 3.x compatible)
  hive_ce: ^2.16.0
  hive_ce_flutter: ^2.3.4

  # Backend
  supabase_flutter: ^2.8.0

  # Routing
  go_router: ^14.6.0

  # Subscription
  purchases_flutter: ^9.13.1

  # Security
  flutter_secure_storage: ^9.2.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0

  # Charts
  fl_chart: ^0.70.2
  graphview: ^1.5.1

  # Image Processing
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  pasteboard: ^0.2.0
  image: ^4.1.7

  # Data Classes
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  equatable: ^2.0.7
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  font_awesome_flutter: ^11.0.0
  google_sign_in: ^6.2.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.5
  flutter_web_auth_2: ^4.0.1
  app_links: ^6.4.1
  package_info_plus: ^8.0.0
  http: ^1.6.0
  shared_preferences: ^2.5.4
  audioplayers: ^6.7.1

  # Local Notifications (案4：48h 跟進提醒)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  hive_ce_generator: ^1.6.0
  riverpod_generator: ^2.6.2

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/practice/
    - assets/images/practice_girls/
    - assets/articles/
    - assets/audio/practice_draw/
