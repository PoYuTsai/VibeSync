# .github/workflows/distribute.yml
# Build & Distribute to Firebase App Distribution (快速迭代測試)

name: Build & Distribute

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_VERSION: 1.0.1

jobs:
  flutter-gate:
    name: Flutter distribution gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run full test suite serially
        run: flutter test --concurrency=1

      - name: Verify production keyboard contract
        shell: pwsh
        run: ./tools/preflight/check-keyboard-contract.ps1
        env:
          SUPABASE_PROD_ANON_KEY: ${{ secrets.SUPABASE_PROD_ANON_KEY }}

  build-android:
    needs: flutter-gate
    runs-on: ubuntu-latest
    env:
      # Safe environment variable assignments
      GIT_REF: ${{ github.ref_name }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Debug Flutter info
        run: |
          flutter --version
          dart --version
          cat pubspec.yaml

      - name: Install dependencies
        run: flutter pub get -v

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (Production backend)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PROD_ANON_KEY }}
          REVENUECAT_KEY: appl_ZYVwxdvbEIAHxYUEHhdVkVLrkdY
        run: |
          flutter build apk --release \
            --build-name="$APP_VERSION" \
            --build-number=${{ github.run_number }} \
            --dart-define=GIT_SHA=$GIT_SHA \
            --dart-define=ENV=prod \
            --dart-define=SUPABASE_PROD_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PROD_ANON_KEY="$SUPABASE_KEY" \
            --dart-define=REVENUECAT_API_KEY="$REVENUECAT_KEY"

      - name: Prepare release notes
        run: |
          echo "Branch: $GIT_REF" > release-notes.txt
          echo "Commit: $GIT_SHA" >> release-notes.txt
          echo "Environment: production backend" >> release-notes.txt

      - name: Debug Firebase config
        run: |
          echo "Checking Firebase secrets..."
          if [ -z "${{ secrets.FIREBASE_ANDROID_APP_ID }}" ]; then
            echo "❌ FIREBASE_ANDROID_APP_ID is not set"
          else
            echo "✅ FIREBASE_ANDROID_APP_ID is set (starts with: ${FIREBASE_ANDROID_APP_ID:0:20}...)"
          fi
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT is not set"
          else
            echo "✅ FIREBASE_SERVICE_ACCOUNT is set (length: ${#FIREBASE_SERVICE_ACCOUNT} chars)"
          fi
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotesFile: release-notes.txt

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-ios:
    needs: flutter-gate
    runs-on: macos-26
    env:
      GIT_REF: ${{ github.ref_name }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Xcode SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -E "iphoneos|iphonesimulator" || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare CocoaPods trunk CDN
        run: |
          rm -rf "$HOME/.cocoapods/repos/trunk"
          pod repo add-cdn trunk https://cdn.cocoapods.org/

      - name: Setup iOS certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYBOARD_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_KEYBOARD_PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH/vibesync.mobileprovision"
          echo "$KEYBOARD_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH/vibesync-keyboard.mobileprovision"

      - name: Build iOS (Production backend)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PROD_ANON_KEY }}
          REVENUECAT_KEY: appl_ZYVwxdvbEIAHxYUEHhdVkVLrkdY
        run: |
          rm -rf build/ios/ipa build/ios/archive
          flutter build ipa --release \
            --build-name="$APP_VERSION" \
            --build-number=${{ github.run_number }} \
            --dart-define=GIT_SHA=$GIT_SHA \
            --dart-define=ENV=prod \
            --dart-define=SUPABASE_PROD_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PROD_ANON_KEY="$SUPABASE_KEY" \
            --dart-define=REVENUECAT_API_KEY="$REVENUECAT_KEY" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Verify iOS app version
        run: |
          set -euo pipefail
          app_plist=$(find build/ios/archive -path "*.xcarchive/Products/Applications/*.app/Info.plist" -type f | head -n 1)
          if [ -z "$app_plist" ]; then
            echo "No archived app Info.plist found"
            exit 1
          fi
          version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_plist")
          build=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$app_plist")
          echo "Archived iOS version: ${version} (${build})"
          if [ "$version" != "$APP_VERSION" ]; then
            echo "Expected CFBundleShortVersionString=$APP_VERSION, got ${version}"
            exit 1
          fi

      - name: Prepare release notes
        run: |
          echo "Branch: $GIT_REF" > release-notes.txt
          echo "Commit: $GIT_SHA" >> release-notes.txt
          echo "Environment: production backend" >> release-notes.txt

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          SERVICE_ACCOUNT_PATH="$RUNNER_TEMP/firebase-service-account.json"
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$SERVICE_ACCOUNT_PATH"
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_PATH" \
            firebase appdistribution:distribute build/ios/ipa/*.ipa \
              --app "$FIREBASE_IOS_APP_ID" \
              --release-notes-file release-notes.txt

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7
