# .github/workflows/deploy-edge-function.yml
# Deploy Supabase Edge Functions.

name: Deploy Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '!supabase/functions/keyboard-reply/**'
      - '.github/workflows/deploy-edge-function.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.105.0

      - name: Check Production Supabase secrets
        shell: pwsh
        run: ./tools/preflight/check-supabase-secrets.ps1 -ProjectRef fcmwrmwdoqiqdnbisdpg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Smoke test RevenueCat server key
        shell: pwsh
        run: ./tools/preflight/check-revenuecat-secret-smoke.ps1
        env:
          REVENUECAT_IOS_API_KEY: ${{ secrets.REVENUECAT_IOS_API_KEY }}

      - name: Link Supabase Project
        run: |
          supabase link --project-ref fcmwrmwdoqiqdnbisdpg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        # Deploy functions one-by-one instead of `supabase functions deploy --all`.
        # OCR baseline requires analyze-chat to keep --no-verify-jwt.
        # coach-follow-up / coach-chat are JWT-verified, so do not pass --no-verify-jwt.
        run: |
          supabase functions deploy analyze-chat --no-verify-jwt
          supabase functions deploy delete-account
          supabase functions deploy practice-chat
          supabase functions deploy sync-subscription
          supabase functions deploy submit-feedback
          supabase functions deploy revenuecat-webhook --no-verify-jwt
          supabase functions deploy coach-follow-up
          supabase functions deploy coach-chat
          # keyboard-reply is intentionally excluded from this generic deploy.
          # Its exactly-once contract requires the matching DB migration first;
          # follow docs/testflight-keyboard-build-checklist.md for the ordered,
          # migration-gated manual deployment.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
