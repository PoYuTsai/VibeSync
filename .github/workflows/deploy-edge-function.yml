# .github/workflows/deploy-edge-function.yml
# 自動部署 Supabase Edge Function

name: Deploy Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-edge-function.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check migration capability
        id: migration-capability
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_DB_PASSWORD is not configured. Database migrations will be skipped in CI for this run."
          else
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Link Supabase Project
        run: |
          supabase link --project-ref fcmwrmwdoqiqdnbisdpg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply database migrations
        if: steps.migration-capability.outputs.can_push == 'true'
        run: supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Record skipped migrations
        if: steps.migration-capability.outputs.can_push != 'true'
        run: |
          echo "CI skipped supabase db push because SUPABASE_DB_PASSWORD is not configured." >> "$GITHUB_STEP_SUMMARY"
          echo "If this commit includes schema changes, apply migrations manually or add the missing GitHub secret." >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy analyze-chat
          supabase functions deploy auth-diagnostics
          supabase functions deploy delete-account
          supabase functions deploy security-alerts
          supabase functions deploy sync-subscription
          supabase functions deploy submit-feedback
          supabase functions deploy revenuecat-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
