# .github/workflows/deploy-edge-function.yml
# Deploy Supabase Edge Functions.

name: Deploy Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-function.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.105.0

      - name: Link Supabase Project
        run: |
          supabase link --project-ref fcmwrmwdoqiqdnbisdpg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        # Deploy functions one-by-one instead of `supabase functions deploy --all`.
        # OCR baseline requires analyze-chat to keep --no-verify-jwt.
        # coach-follow-up / coach-chat are JWT-verified, so do not pass --no-verify-jwt.
        run: |
          supabase functions deploy analyze-chat --no-verify-jwt
          supabase functions deploy delete-account
          supabase functions deploy sync-subscription
          supabase functions deploy submit-feedback
          supabase functions deploy revenuecat-webhook --no-verify-jwt
          supabase functions deploy coach-follow-up
          supabase functions deploy coach-chat
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
