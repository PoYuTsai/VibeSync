# .github/workflows/flutter-ci.yml
# PR gate: analysis and the complete Flutter test suite are blocking.
# The suite runs serially because several tests share process-global Hive and
# Supabase state; parallel workers can otherwise create false red runs.
#
# Security note (per GitHub Actions injection guide):
# 此 workflow 不消費任何 untrusted user input。唯一 ${{ }} expression 是
# concurrency.group 內的 `github.ref`，controlled context，不進 run: shell。
# command injection surface = 0。

name: Flutter CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze:
    name: Test & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # build_runner 產生的 .g.dart / .freezed.dart 不在 git；少了會讓
      # `flutter analyze` 報幾百個 phantom missing-import error。distribute.yml
      # 走同一步驟。
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run full test suite serially
        run: flutter test --concurrency=1
