# .github/workflows/release.yml
# Release to App Stores (TestFlight + Internal Testing)
# Manual trigger only - for production releases

name: Release to App Stores

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  release-ios:
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean Flutter build
        run: flutter clean

      - name: Reinstall dependencies
        run: flutter pub get

      - name: Clean iOS pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod cache clean --all || true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test || echo "Some tests failed, continuing build..."
        continue-on-error: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install Fastlane
        run: |
          cd ios
          gem install fastlane

      - name: Setup iOS certificates and provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -e  # Exit on error

          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "=== Step 1: Decode certificate and profile from base64 ==="
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo "Certificate decoded, size: $(wc -c < $CERTIFICATE_PATH) bytes"

          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH
          echo "Profile decoded, size: $(wc -c < $PROFILE_PATH) bytes"

          echo "=== Step 2: Create and configure keychain ==="
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "Keychain created and unlocked"

          echo "=== Step 3: Import certificate to keychain ==="
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "Certificate imported"

          echo "=== Step 4: Verify certificate ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH

          echo "=== Step 5: Install provisioning profile ==="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Decode profile content
          PROFILE_CONTENT=$(security cms -D -i $PROFILE_PATH)

          # Extract UUID
          PROFILE_UUID=$(echo "$PROFILE_CONTENT" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          echo "Profile UUID: $PROFILE_UUID"

          # Extract profile name
          PROFILE_NAME=$(echo "$PROFILE_CONTENT" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          echo "Profile Name: $PROFILE_NAME"

          # Extract Team ID
          TEAM_ID=$(echo "$PROFILE_CONTENT" | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)
          echo "Team ID: $TEAM_ID"

          # Extract Bundle ID
          APP_ID=$(echo "$PROFILE_CONTENT" | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin)
          echo "App ID: $APP_ID"

          # Copy profile with UUID as filename
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Profile installed as: $PROFILE_UUID.mobileprovision"

          echo "=== Step 6: Verify installation ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          # Export for later steps
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "=== Setup complete ==="

      - name: Generate ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>TTQHTVG8CC</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.poyutsai.vibesync</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF
          echo "Generated ExportOptions.plist:"
          cat ios/ExportOptions.plist

      - name: Build iOS IPA
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PROD_ANON_KEY }}
          REVENUECAT_KEY: ${{ secrets.REVENUECAT_PROD_KEY }}
        run: |
          flutter build ipa --release \
            --dart-define=ENV=prod \
            --dart-define=SUPABASE_PROD_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PROD_ANON_KEY="$SUPABASE_KEY" \
            --dart-define=REVENUECAT_PROD_KEY="$REVENUECAT_KEY" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Verify IPA exists
        run: |
          echo "=== Checking build directory structure ==="
          echo "Contents of build/:"
          ls -la build/ || echo "build/ directory not found"
          echo ""
          echo "Contents of build/ios/:"
          ls -la build/ios/ || echo "build/ios/ directory not found"
          echo ""
          echo "Contents of build/ios/ipa/:"
          ls -la build/ios/ipa/ || echo "build/ios/ipa/ directory not found"
          echo ""
          echo "Looking for any .ipa files:"
          find build -name "*.ipa" 2>/dev/null || echo "No .ipa files found"
          echo ""
          echo "Looking for any .xcarchive:"
          find build -name "*.xcarchive" -type d 2>/dev/null || echo "No .xcarchive found"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: cd ios && fastlane beta

  release-android:
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test || echo "Some tests failed, continuing build..."
        continue-on-error: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Install Fastlane
        run: |
          cd android
          gem install fastlane

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "storeFile=keystore.jks" >> android/key.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties

      - name: Build Android (Production)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PROD_ANON_KEY }}
          REVENUECAT_KEY: ${{ secrets.REVENUECAT_PROD_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=ENV=prod \
            --dart-define=SUPABASE_PROD_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PROD_ANON_KEY="$SUPABASE_KEY" \
            --dart-define=REVENUECAT_PROD_KEY="$REVENUECAT_KEY"

      - name: Upload to Play Store (Internal)
        env:
          PLAY_STORE_CONFIG_JSON: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: cd android && fastlane internal
